<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer SDK · Minimal Example</title>
    <meta
      name="description"
      content="Bare-bones @memizy/multiplayer-sdk plugin. Uses the SDK's landing page; bot peers fill in the missing participants so the whole lifecycle runs in one tab."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="application/oqse-manifest+json">
      {
        "$schema": "https://cdn.jsdelivr.net/gh/memizy/oqse-specification@main/schemas/oqse-manifest-v0.1.json",
        "version": "0.1",
        "pluginVersion": "1.0.0",
        "minOqseVersion": "0.1",
        "maxOqseVersion": "1.99",
        "id": "com.memizy.example.multiplayer-minimal",
        "appName": "Multiplayer SDK Minimal Example",
        "description": "The smallest real multiplayer plugin — one sdk.connect(), zero custom harness code, everything else is shadow bots on an in-memory hub.",
        "author": "Memizy Dev Team",
        "authorUrl": "https://memizy.com",
        "locales": ["en"],
        "emoji": "✨",
        "studyMode": "game",
        "capabilities": {
          "actions": ["render"],
          "types": ["mcq-single", "true-false", "short-answer"],
          "assets": { "image": null, "audio": null, "video": null, "model": null },
          "features": ["markdown"]
        },
        "appSpecific": {
          "memizy": {
            "multiplayerSdk": {
              "apiVersion": "0.4",
              "minimumHostApiVersion": "0.4",
              "customSyncScreen": false,
              "hasSettingsScreen": true,
              "players": { "min": 2, "max": 60, "recommended": 20 },
              "supportsLateJoin": true,
              "supportsReconnect": true,
              "supportsTeams": false,
              "requiresHostScreen": true,
              "clientOrientation": "portrait"
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --mz-orange: #ff6f00;
        --mz-orange-d: #e65100;
        --mz-blue: #1e88e5;
        --mz-blue-d: #1565c0;
        --mz-bg: #f8f9fa;
        --mz-card: #ffffff;
        --mz-border: #e9ecef;
        --mz-text: #212529;
        --mz-text-muted: #6c757d;
      }

      *,
      *::before,
      *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI',
          Roboto, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        color: var(--mz-text);
        background: var(--mz-bg);
        -webkit-font-smoothing: antialiased;
      }

      /* ── "Plugin shell" — what replaces the landing page once the user
            clicks "Try as host" / "Try as player". Matches
            plugin-sdk/example/minimal.html layout tokens. ──────────── */
      .page {
        max-width: 880px;
        margin: 0 auto;
        padding: 56px 24px 120px;
      }

      .page-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 8px;
      }

      .logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 1.4rem;
        box-shadow: 0 6px 16px rgba(255, 111, 0, 0.28);
      }

      h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      h1 span {
        color: var(--mz-text-muted);
        font-weight: 600;
      }

      .lead {
        color: var(--mz-text-muted);
        margin: 6px 0 0;
        font-size: 15px;
      }

      .badges {
        display: flex;
        gap: 6px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .badge {
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        background: #fff7ed;
        color: #9a3412;
      }

      .badge-blue {
        background: #eff6ff;
        color: #1d4ed8;
      }

      .badge-green {
        background: #ecfdf5;
        color: #065f46;
      }

      .card {
        background: var(--mz-card);
        border: 1px solid var(--mz-border);
        border-radius: 16px;
        padding: 22px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.04);
        margin-top: 24px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--mz-text-muted);
      }

      .card p {
        margin: 0 0 14px;
        font-size: 14px;
        color: var(--mz-text-muted);
      }

      .callout {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 12px 14px;
        margin: 0 0 18px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
        border-radius: 10px;
        color: #9a3412;
        font-size: 13px;
        line-height: 1.5;
      }
      .callout-icon {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 800;
        box-shadow: 0 2px 6px rgba(255, 111, 0, 0.25);
      }
      .callout strong { color: #7c2d12; }
      .callout code { background: #ffedd5; color: #9a3412; }

      .kv {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px dashed var(--mz-border);
        font-size: 14px;
      }
      .kv:last-child { border-bottom: none; }
      .kv .k { color: var(--mz-text-muted); }
      .kv .v { font-weight: 600; }

      /* Phase pill */
      .phase-pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .phase-settings  { background: #fff7ed; color: #9a3412; }
      .phase-syncing   { background: #eff6ff; color: #1d4ed8; }
      .phase-playing   { background: #ecfdf5; color: #065f46; }
      .phase-finished  { background: #f3e8ff; color: #6b21a8; }

      /* Question card */
      .question {
        display: grid;
        gap: 14px;
        margin-top: 4px;
      }

      .question-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .question-prompt {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.45;
        margin: 0;
      }

      .options {
        display: grid;
        gap: 8px;
      }

      .option-btn {
        appearance: none;
        text-align: left;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--mz-border);
        background: var(--mz-card);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
      }
      .option-btn:hover:not(:disabled) {
        background: var(--mz-bg);
        border-color: #d4d4d8;
      }
      .option-btn:active:not(:disabled) { transform: translateY(1px); }
      .option-btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .option-btn.picked {
        border-color: var(--mz-blue);
        background: #eff6ff;
        color: var(--mz-blue-d);
      }
      .option-btn.correct {
        border-color: #10b981;
        background: #ecfdf5;
        color: #065f46;
      }
      .option-btn.wrong {
        border-color: #ef4444;
        background: #fef2f2;
        color: #b91c1c;
      }

      .short-input {
        width: 100%;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
        border: 1px solid var(--mz-border);
        border-radius: 10px;
        background: var(--mz-card);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 16px;
        font: inherit;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s,
          box-shadow 0.15s, transform 0.1s;
      }
      .btn:active:not(:disabled) { transform: translateY(1px); }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }

      .btn-primary {
        background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%);
        color: #fff;
        border-color: var(--mz-orange-d);
        box-shadow: 0 3px 10px rgba(255, 111, 0, 0.25);
      }
      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #e65100 0%, #ff6f00 100%);
      }

      .btn-secondary {
        background: var(--mz-card);
        color: var(--mz-text);
        border-color: var(--mz-border);
      }
      .btn-secondary:hover:not(:disabled) { background: var(--mz-bg); }

      .btn-danger {
        background: #fff;
        color: #b91c1c;
        border-color: #fecaca;
      }
      .btn-danger:hover:not(:disabled) {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #991b1b;
      }

      /* Scoreboard */
      .scoreboard {
        display: grid;
        gap: 8px;
      }
      .score-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid var(--mz-border);
        border-radius: 10px;
        background: var(--mz-bg);
      }
      .score-row.me { background: #fff7ed; border-color: #fed7aa; }
      .score-name { font-weight: 700; font-size: 14px; }
      .score-sub { color: var(--mz-text-muted); font-size: 12px; margin-top: 2px; }
      .score-value {
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--mz-text);
        font-size: 18px;
      }

      /* Protocol log */
      .log-pane {
        margin: 0;
        padding: 12px;
        background: #0f172a;
        color: #cbd5e1;
        border-radius: 10px;
        font-family: 'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.55;
        max-height: 280px;
        min-height: 140px;
        overflow: auto;
      }
      .log-line { display: flex; gap: 8px; padding: 1px 0; }
      .log-ts   { color: #64748b; flex-shrink: 0; }
      .log-tag  {
        padding: 0 6px; border-radius: 3px;
        font-weight: 700; font-size: 10px; letter-spacing: 0.04em;
        flex-shrink: 0;
        align-self: center;
      }
      .log-tag-sys    { background: #334155; color: #e2e8f0; }
      .log-tag-host   { background: #3b82f6; color: #fff;    }
      .log-tag-player { background: #10b981; color: #fff;    }
      .log-tag-bot    { background: #8b5cf6; color: #fff;    }
      .log-msg { color: #e2e8f0; word-break: break-word; flex: 1; }

      .footer-link {
        display: inline-block;
        margin-top: 28px;
        color: var(--mz-text-muted);
        font-size: 13px;
        text-decoration: none;
        border-bottom: 1px dashed var(--mz-border);
      }
      .footer-link:hover { color: var(--mz-orange-d); }

      code {
        font-family: 'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;
        font-size: 12.5px;
        background: var(--mz-bg);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--mz-orange-d);
      }
    </style>
  </head>
  <body>
    <!--
      The SDK's built-in landing page renders into #app when the plugin
      is opened outside a Memizy iframe. After the user clicks "Try as
      host" or "Try as player" the plugin replaces it with its own UI.
    -->
    <div id="app"></div>

    <script type="module" src="./src/minimal.ts"></script>
  </body>
</html>
