<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer SDK · Minimal Example</title>
    <meta
      name="description"
      content="Smallest possible @memizy/multiplayer-sdk example — one host plugin, one player plugin, all the lifecycle callbacks in ~180 lines."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="application/oqse-manifest+json">
      {
        "$schema": "https://cdn.jsdelivr.net/gh/memizy/oqse-specification@main/schemas/oqse-manifest-v0.1.json",
        "version": "0.1",
        "id": "com.memizy.example.multiplayer-minimal",
        "appName": "Multiplayer SDK Minimal Example",
        "description": "Bare-bones host + player harness built on MemoryMockHub.",
        "locales": ["en"],
        "emoji": "✨",
        "capabilities": {
          "actions": ["render"],
          "types": ["note"],
          "assets": { "image": null, "audio": null, "video": null, "model": null },
          "features": ["markdown"]
        },
        "appSpecific": {
          "memizy": {
            "multiplayer": {
              "apiVersion": "0.4",
              "players": { "min": 1, "max": 10, "recommended": 1 },
              "supportsLateJoin": true,
              "supportsReconnect": true,
              "supportsTeams": false,
              "requiresHostScreen": false,
              "clientOrientation": "portrait"
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --mz-orange: #ff6f00;
        --mz-orange-d: #e65100;
        --mz-bg: #f8f9fa;
        --mz-card: #ffffff;
        --mz-border: #e9ecef;
        --mz-text: #212529;
        --mz-text-muted: #6c757d;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        color: var(--mz-text);
        background: var(--mz-bg);
      }
      .page { max-width: 900px; margin: 0 auto; padding: 56px 24px 120px; }
      .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
      .logo {
        width: 48px; height: 48px; border-radius: 12px;
        background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%);
        color: #fff; display: grid; place-items: center; font-size: 1.4rem;
        box-shadow: 0 6px 16px rgba(255,111,0,.28);
      }
      h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
      h1 span { color: var(--mz-text-muted); font-weight: 600; }
      .lead { color: var(--mz-text-muted); margin: 6px 0 0; }
      .card {
        background: var(--mz-card);
        border: 1px solid var(--mz-border);
        border-radius: 16px;
        padding: 22px;
        box-shadow: 0 1px 4px rgba(0,0,0,.05);
        margin-top: 24px;
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--mz-text-muted);
      }
      .kv { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--mz-border); }
      .kv:last-child { border-bottom: none; }
      .kv .k { color: var(--mz-text-muted); font-size: 13px; }
      .kv .v { font-weight: 600; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
      .btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 16px;
        font: inherit;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        transition: background .15s, color .15s, border-color .15s, box-shadow .15s, transform .1s;
      }
      .btn:active:not(:disabled) { transform: translateY(1px); }
      .btn-primary {
        background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%);
        color: #fff; border-color: var(--mz-orange-d);
        box-shadow: 0 3px 10px rgba(255,111,0,.25);
      }
      .btn-primary:hover { background: linear-gradient(135deg, #e65100 0%, #ff6f00 100%); }
      .btn-secondary {
        background: var(--mz-card); color: var(--mz-text);
        border-color: var(--mz-border);
      }
      .btn-secondary:hover { background: var(--mz-bg); }
      pre {
        margin: 0;
        padding: 12px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        font-family: 'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.5;
        max-height: 220px;
        overflow: auto;
      }
      .log-pane {
        margin: 0;
        padding: 12px;
        background: #0f172a;
        color: #cbd5e1;
        border-radius: 8px;
        font-family: 'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.5;
        max-height: 360px;
        min-height: 220px;
        overflow: auto;
      }
      .log-line { display: flex; gap: 8px; padding: 1px 0; }
      .log-ts { color: #64748b; flex-shrink: 0; }
      .log-tag {
        padding: 0 6px; border-radius: 3px;
        font-weight: 700; font-size: 10px; letter-spacing: 0.04em;
        flex-shrink: 0;
      }
      .log-tag-sys    { background: #334155; color: #e2e8f0; }
      .log-tag-host   { background: #3b82f6; color: #fff;    }
      .log-tag-player { background: #10b981; color: #fff;    }
      .log-msg { color: #e2e8f0; word-break: break-word; }
      .footer-link {
        display: inline-block;
        margin-top: 28px;
        color: var(--mz-text-muted);
        font-size: 13px;
        text-decoration: none;
        border-bottom: 1px dashed var(--mz-border);
      }
      .footer-link:hover { color: var(--mz-orange-d); }
      code {
        font-family: 'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;
        font-size: 12.5px;
        background: var(--mz-bg);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--mz-orange-d);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div class="logo" aria-hidden="true">✨</div>
        <div>
          <h1>Multiplayer SDK · <span>Minimal Example</span></h1>
          <p class="lead">
            One host, one player, one <code>MemoryMockHub</code>. Watch every
            RPC fly by in the log below.
          </p>
        </div>
      </header>

      <section class="card">
        <h2>Session</h2>
        <div class="kv"><span class="k">Phase</span><span class="v" id="mini-phase">—</span></div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="mini-btn-start">▶ Start game</button>
          <button type="button" class="btn btn-secondary" id="mini-btn-buzz">🔔 Player buzz</button>
          <button type="button" class="btn btn-secondary" id="mini-btn-end">⏹ End game</button>
        </div>
      </section>

      <section class="card">
        <h2>Authoritative state (from player's view)</h2>
        <pre id="mini-state">—</pre>
      </section>

      <section class="card">
        <h2>Protocol log</h2>
        <div class="log-pane" id="mini-log" role="log" aria-live="polite"></div>
      </section>

      <a class="footer-link" href="./index.html">← Back to the full sandbox</a>
    </main>

    <script type="module" src="./src/minimal.ts"></script>
  </body>
</html>
