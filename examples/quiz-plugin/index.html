<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Plugin Example</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: #182131;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: #ffffff;
      }

      #app {
        max-width: 640px;
        margin: 0 auto;
      }

      .card {
        border: 1px solid #d6deea;
        border-radius: 0.8rem;
        padding: 1rem;
        background: #f8fafe;
      }

      .row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #22344f;
        background: #20344f;
        color: #fff;
        border-radius: 0.5rem;
        padding: 0.5rem 0.8rem;
        cursor: pointer;
      }

      ul {
        margin: 0.5rem 0 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
