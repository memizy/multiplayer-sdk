<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Plugin Example</title>
    <style>
      :root {
        --blue: #2563eb;
        --orange: #f97316;
        --green: #16a34a;
        --red: #dc2626;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: #182131;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: #ffffff;
      }

      #app {
        max-width: 640px;
        margin: 0 auto;
      }

      .card {
        border: 2px solid var(--orange);
        border-radius: 0.8rem;
        padding: 1rem;
        background: #f8fafe;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
      }

      .row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--blue);
        background: var(--blue);
        color: #fff;
        border-radius: 0.5rem;
        padding: 0.5rem 0.8rem;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--orange);
        border-color: var(--orange);
      }

      ul {
        margin: 0.5rem 0 0;
      }

      h1 {
        color: var(--blue);
      }

      h2 {
        color: var(--orange);
      }

      pre {
        border-left: 4px solid var(--green);
        padding-left: 0.75rem;
      }

      /* Landing page styles */
      .landing-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #f0f9ff 0%, #fef3c7 100%);
      }

      .landing-header {
        background: linear-gradient(135deg, var(--blue) 0%, #1e40af 100%);
        color: #fff;
        padding: 3rem 1rem;
        text-align: center;
      }

      .landing-hero {
        max-width: 640px;
        margin: 0 auto;
      }

      .landing-emoji {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      .landing-title {
        font-size: 2.5rem;
        margin: 0 0 0.5rem;
        font-weight: 700;
      }

      .landing-subtitle {
        font-size: 1.2rem;
        margin: 0;
        opacity: 0.95;
      }

      .landing-content {
        flex: 1;
        max-width: 640px;
        margin: 2rem auto 0;
        padding: 0 1rem;
      }

      .landing-card {
        background: #fff;
        border: 2px solid var(--orange);
        border-radius: 0.8rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
      }

      .landing-card h2 {
        margin-top: 0;
        font-size: 1.3rem;
      }

      .landing-card p {
        line-height: 1.6;
        margin: 0.5rem 0;
      }

      .landing-card ul {
        list-style: none;
        padding: 0;
      }

      .landing-card li {
        padding: 0.5rem 0;
      }

      .landing-card a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 600;
        border-bottom: 2px solid var(--orange);
        transition: color 0.2s, border-color 0.2s;
      }

      .landing-card a:hover {
        color: var(--orange);
        border-bottom-color: var(--blue);
      }

      .landing-meta {
        font-size: 0.9rem;
        color: #666;
      }

      .landing-links {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .landing-btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        border: 2px solid transparent;
      }

      .landing-btn-primary {
        background: var(--blue);
        color: #fff;
      }

      .landing-btn-primary:hover {
        background: #1e40af;
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
      }

      .landing-btn-secondary {
        background: transparent;
        color: var(--blue);
        border-color: var(--orange);
      }

      .landing-btn-secondary:hover {
        background: var(--orange);
        color: #fff;
      }

      .landing-footer {
        background: rgba(37, 99, 235, 0.05);
        border-top: 1px solid var(--orange);
        padding: 1.5rem;
        text-align: center;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #666;
      }

      .landing-footer a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 600;
      }

      .landing-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- OQSE Manifest Data Island -->
    <script type="application/oqse-manifest+json">
      {
        "$schema": "https://memizy.com/schemas/oqse-manifest/v0.1.json",
        "version": "0.1",
        "pluginVersion": "0.1.0",
        "minOqseVersion": "0.1",
        "id": "https://memizy.com/multiplayer-sdk/quiz",
        "appName": "Quiz Plugin",
        "description": "A collaborative multiplayer quiz plugin demonstrating the Memizy SDK capabilities.",
        "author": "Memizy Team",
        "authorUrl": "https://memizy.com",
        "locales": ["en", "cs"],
        "tags": ["quiz", "multiplayer", "collaborative", "learning"],
        "emoji": "🎯",
        "studyMode": "fun",
        "questionDensity": "high",
        "capabilities": {
          "actions": ["render"],
          "types": ["mcq-single"],
          "assets": {
            "image": ["image/jpeg", "image/png", "image/webp"],
            "audio": null,
            "video": null,
            "model": null
          },
          "features": ["markdown"],
          "itemProperties": ["hints", "explanation"],
          "metaProperties": ["description", "author"]
        }
      }
    </script>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
