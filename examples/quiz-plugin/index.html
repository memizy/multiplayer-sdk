<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Plugin Example</title>
    <style>
      :root {
        --blue: #2563eb;
        --orange: #f97316;
        --green: #16a34a;
        --red: #dc2626;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: #182131;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: #ffffff;
      }

      #app {
        max-width: 640px;
        margin: 0 auto;
      }

      .card {
        border: 2px solid var(--orange);
        border-radius: 0.8rem;
        padding: 1rem;
        background: #f8fafe;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
      }

      .row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--blue);
        background: var(--blue);
        color: #fff;
        border-radius: 0.5rem;
        padding: 0.5rem 0.8rem;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--orange);
        border-color: var(--orange);
      }

      ul {
        margin: 0.5rem 0 0;
      }

      h1 {
        color: var(--blue);
      }

      h2 {
        color: var(--orange);
      }

      pre {
        border-left: 4px solid var(--green);
        padding-left: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
